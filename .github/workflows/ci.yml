name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - "release/**"
  push:
    branches:
      - main
      - develop
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer:v2

      - name: Validate composer metadata
        run: composer validate --strict

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHP CI checks and tests
        run: composer ci:php

  assets:
    name: Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js -- --quiet

      - name: Lint styles
        run: npm run lint:css

      - name: Run JavaScript tests
        run: npm run test:js

      - name: Build assets
        run: npm run build

  package:
    name: Production Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer:v2

      - name: Install production composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-progress --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare plugin package
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/release/aculect-ai-companion"
          rsync -rc --exclude-from="$GITHUB_WORKSPACE/.distignore" "$GITHUB_WORKSPACE/" "${GITHUB_WORKSPACE}/release/aculect-ai-companion/" --delete --delete-excluded

      - name: Verify production package contents
        run: php bin/verify-production-package.php release/aculect-ai-companion
