name: Build Plugin Pre-Release

on:
  release:
    types: [prereleased]

permissions:
  contents: write

jobs:
  build:
    name: Build Plugin Artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - uses: actions/setup-node@v6
        with:
          node-version: "24.16.0"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare plugin package
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/release/aculect-ai-companion"
          rsync -rc --exclude-from="$GITHUB_WORKSPACE/.distignore" "$GITHUB_WORKSPACE/" "${GITHUB_WORKSPACE}/release/aculect-ai-companion/" --delete --delete-excluded

      - name: Verify production package contents
        run: php bin/verify-production-package.php release/aculect-ai-companion

      - name: Setup Node for Plugin Check
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"

      - name: Run Plugin Check
        run: |
          PLUGIN_DIR=$(realpath "./release/aculect-ai-companion")
          PLUGIN_SLUG="aculect-ai-companion"

          cat > .wp-env.json <<JSON
          {
            "core": null,
            "port": 8880,
            "testsEnvironment": false,
            "plugins": [ "https://downloads.wordpress.org/plugin/plugin-check.zip" ],
            "mappings": {
              "wp-content/plugins/${PLUGIN_SLUG}": "${PLUGIN_DIR}"
            }
          }
          JSON

          npm -g --no-fund i @wordpress/env@11.6.0
          wp-env start --update
          for attempt in {1..12}; do
            if wp-env run cli wp core is-installed >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          wp-env run cli wp core is-installed
          wp-env run cli wp plugin activate "${PLUGIN_SLUG}"
          wp-env run cli wp plugin check "${PLUGIN_SLUG}" --format=json --ignore-warnings --exclude-files=.wp-env.json --slug="${PLUGIN_SLUG}" --require=./wp-content/plugins/plugin-check/cli.php > "${RUNNER_TEMP}/plugin-check-results.txt"
          cat "${RUNNER_TEMP}/plugin-check-results.txt"

      - name: Generate plugin artifact
        run: |
          cd "${GITHUB_WORKSPACE}/release" || exit 1
          zip -r "${GITHUB_WORKSPACE}/aculect-ai-companion.zip" aculect-ai-companion

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ github.workspace }}/aculect-ai-companion.zip" --clobber
