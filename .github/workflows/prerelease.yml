name: Build Prerelease Artifact

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir -p dist/quark
          rsync -a ./ dist/quark/ --exclude-from=.distignore
          cd dist
          zip -r quark-${{ github.event.release.tag_name }}.zip quark

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/quark-${{ github.event.release.tag_name }}.zip
