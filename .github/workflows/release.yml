name: Build Plugin Release

on:
  release:
    types: [released]

permissions:
  contents: write

jobs:
  build:
    name: Build Plugin Artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare plugin package
        run: |
          rsync -rc --exclude-from="$GITHUB_WORKSPACE/.distignore" "$GITHUB_WORKSPACE/" release/ --delete --delete-excluded

      - name: Verify production package contents
        run: php bin/verify-production-package.php release

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: "./release"
          slug: "aculect-ai-companion"
          ignore-warnings: true

      - name: Generate plugin artifact
        run: |
          cd "${GITHUB_WORKSPACE}/release" || exit 1
          zip -r "${GITHUB_WORKSPACE}/aculect-ai-companion.zip" .

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/aculect-ai-companion.zip
          asset_name: aculect-ai-companion.zip
          asset_content_type: application/zip
